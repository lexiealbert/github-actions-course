name: 10-exercise
on:
  workflow_dispatch:
    inputs:
      pass-unit-tests:
        type: boolean
        default: false
        description : Pass the unit tests?
jobs:
 lint-build:
   runs-on: ubuntu-latest
   steps:
     - name: Lint and build
       run: |
         echo "Linting and building project"
 unit-tests:
  runs-on: ubuntu-latest
  steps:
    - name: Running unit tests
      run: |
        echo "Running tests..."
    - name: Failing tests
      if: ${{ !inputs.pass-unit-tests }}
      run: |
        exit 1
 deploy-nonprod:
  runs-on: ubuntu-latest
  needs:
    - lint-build
    - unit-tests
  steps:
    - name: Deploying to nonprod
      run: |
        echo "Deploying to nonprod..."
 e2e-tests:
   runs-on: ubuntu-latest
   needs:
     - deploy-nonprod
   steps:
     - name: Running E2E tests
       run: |
         echo "Running e2e tests..."
